<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@twemoji/api@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="dashboard-layout">
        <!-- Left Sidebar: Clock, Weather, Calendar -->
        <div class="sidebar">
            <div class="dark-mode-toggle" onclick="toggleDarkMode()">
                <span id="darkModeIcon">🌙</span>
            </div>

            <div class="clock-widget">
                <div class="clock-time" id="clockTime">12:00:00</div>
                <div class="clock-date" id="clockDate">Loading...</div>
            </div>

            <div class="weather-widget" id="weatherWidget">
                <!-- Weather will be added here -->
            </div>

            <div class="calendar-widget" id="calendarWidget">
                <!-- Calendar will be added here -->
            </div>
        </div>

        <!-- Main Content: Kids Cards and Rewards -->
        <div class="main-content">
            <div class="header">
                <h1>Family Dashboard</h1>
            </div>

            <div class="kids-container" id="kidsContainer">
                <!-- Kids will be dynamically generated from CONFIG -->
            </div>

            <div class="reset-container">
                <button class="reset-btn" onclick="endOfDayAll()">End of Day for All Kids</button>
            </div>

            <div class="status-message" id="statusMessage"></div>

            <!-- Rewards Section -->
            <div class="rewards-section">
                <div class="section-header">
                    <h2>🎁 Rewards Store</h2>
                </div>
                <div class="rewards-grid" id="rewardsContainer">
                    <!-- Rewards will be dynamically generated -->
                </div>
            </div>
        </div>

        <!-- Right Column: Chores -->
        <div class="right-column">
            <!-- Chores Section -->
            <div class="chores-section">
                <div class="section-header">
                    <h2>📋 Chores</h2>
                    <button class="reset-btn" onclick="resetAllChores()" style="font-size: 10px; padding: 6px 10px;">Reset</button>
                </div>
                <div id="choresContainer">
                    <!-- Chores will be dynamically generated -->
                </div>
            </div>

            <!-- Activities Section -->
            <div class="chores-section">
                <div class="section-header">
                    <h2>⭐ Activities</h2>
                </div>
                <div id="activitiesContainer">
                    <!-- Activities will be dynamically generated -->
                </div>
            </div>
        </div>
    </div>

    <!-- PIN Modal -->
    <div class="pin-modal" id="pinModal">
        <div class="pin-content">
            <h2 id="pinModalTitle">Enter PIN to Edit</h2>
            <div class="pin-display" id="pinDisplay">••••</div>
            <div class="pin-error" id="pinError"></div>

            <div class="numpad">
                <button class="num-btn" onclick="addPinDigit('1')">1</button>
                <button class="num-btn" onclick="addPinDigit('2')">2</button>
                <button class="num-btn" onclick="addPinDigit('3')">3</button>
                <button class="num-btn" onclick="addPinDigit('4')">4</button>
                <button class="num-btn" onclick="addPinDigit('5')">5</button>
                <button class="num-btn" onclick="addPinDigit('6')">6</button>
                <button class="num-btn" onclick="addPinDigit('7')">7</button>
                <button class="num-btn" onclick="addPinDigit('8')">8</button>
                <button class="num-btn" onclick="addPinDigit('9')">9</button>
                <button class="num-btn clear-btn" onclick="clearPin()">Clear</button>
                <button class="num-btn" onclick="addPinDigit('0')">0</button>
                <button class="num-btn clear-btn" onclick="backspacePin()">⌫</button>
            </div>

            <div class="pin-buttons">
                <button class="pin-btn plus-btn" onclick="checkPin()">Unlock</button>
                <button class="pin-btn reset-btn" onclick="closePinModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Kid Selector Modal -->
    <div class="pin-modal" id="kidSelectorModal">
        <div class="pin-content">
            <div id="kidSelectorContent">
                <!-- Content will be dynamically generated -->
            </div>
            <div class="pin-buttons">
                <button class="pin-btn reset-btn" onclick="closeKidSelector()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Unlock Indicator -->
    <div class="unlock-indicator" id="unlockIndicator" onclick="lockDashboard()">🔓 Unlocked (click to lock)</div>

    <script>
        // ====== CONFIGURATION ======
        // CONFIG is loaded from Google Sheets Config tab
        let CONFIG = null;
        const SHEETS_API_URL = 'https://script.google.com/macros/s/AKfycbxGpKE8kZEv5PKbBfteVru3WcyP_qfX7U_eV5TEZrfPxrfxrlNmjqh3BRpsnSdNIsRNIQ/exec';

        let isUnlocked = false;
        let unlockTimeout = null;
        let enteredPin = '';
        let useGoogleSheets = false;
        let CHORES = null;
        let REWARDS = null;
        let ACTIVITIES = null;

        // PIN context for kid-specific authentication
        let pinContext = {
            type: 'parent',  // 'parent' or 'kid'
            kidId: null,      // The kid ID when type is 'kid'
            action: null,     // 'cash-in' or 'purchase'
            callback: null    // Function to call after successful PIN entry
        };

        // ====== GOOGLE SHEETS INTEGRATION ======

        // Fetch configuration from Google Sheets
        async function fetchConfig() {
            try {
                const url = `${SHEETS_API_URL}?action=getConfig&t=${Date.now()}`;
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                if (data.success && data.config) {
                    console.log('Loaded config from Google Sheets');
                    return data.config;
                }

                return null;
            } catch (error) {
                console.error('Error fetching config:', error);
                return null;
            }
        }

        // Fetch current points from Google Sheets
        async function fetchPointsFromSheets() {
            if (!SHEETS_API_URL) {
                console.log('No Google Sheets API URL configured');
                return null;
            }

            try {
                const url = `${SHEETS_API_URL}?action=getCurrentPoints&t=${Date.now()}`;
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                if (data.success && data.points) {
                    console.log('Fetched points from Google Sheets:', data.points);
                    return data.points;
                }

                return null;
            } catch (error) {
                console.error('Error fetching from Google Sheets:', error);
                return null;
            }
        }

        // Save points to Google Sheets
        async function savePointsToSheets(kidId, dailyBP, totalBP, prizeCoins, type = 'behavior', note = '') {
            if (!SHEETS_API_URL) {
                console.log('No Google Sheets API URL configured');
                return false;
            }

            try {
                const kid = getKidByID(kidId);
                if (!kid) return false;

                const response = await fetch(SHEETS_API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Required for Google Apps Script
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: 'logPoints',
                        kid: kid.name,
                        dailyBP: dailyBP,
                        totalBP: totalBP,
                        prizeCoins: prizeCoins,
                        type: type,
                        note: note
                    })
                });

                console.log('Saved points to Google Sheets:', kidId, dailyBP, 'Daily BP,', totalBP, 'Total BP,', prizeCoins, 'PC');
                return true;
            } catch (error) {
                console.error('Error saving to Google Sheets:', error);
                return false;
            }
        }

        // ====== WEATHER INTEGRATION ======

        // Fetch weather data from Open-Meteo API (free, no API key needed)
        async function fetchWeatherData() {
            if (!CONFIG.weather || !CONFIG.weather.latitude || !CONFIG.weather.longitude) {
                console.log('Weather location not configured');
                return null;
            }

            try {
                const { latitude, longitude, timezone } = CONFIG.weather;
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,weather_code&hourly=temperature_2m,weather_code&timezone=${timezone}&temperature_unit=fahrenheit&forecast_days=1`;

                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Error fetching weather:', error);
                return null;
            }
        }

        // Weather code to emoji/description mapping
        function getWeatherEmoji(code) {
            const weatherCodes = {
                0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️',
                45: '🌫️', 48: '🌫️',
                51: '🌦️', 53: '🌦️', 55: '🌦️',
                61: '🌧️', 63: '🌧️', 65: '🌧️',
                71: '🌨️', 73: '🌨️', 75: '🌨️',
                80: '🌦️', 81: '🌦️', 82: '🌦️',
                95: '⛈️', 96: '⛈️', 99: '⛈️'
            };
            return weatherCodes[code] || '🌤️';
        }

        // Update weather widget display
        async function updateWeather() {
            const weatherData = await fetchWeatherData();
            if (!weatherData) {
                document.getElementById('weatherWidget').innerHTML = '<div style="text-align: center; color: #999; font-size: 12px;">Weather unavailable<br><small>Update CONFIG.weather</small></div>';
                return;
            }

            const current = weatherData.current;
            const hourly = weatherData.hourly;
            const currentHour = new Date().getHours();

            // Get next 6 hours of forecast
            const forecastHtml = [];
            for (let i = 0; i < 6; i++) {
                const hour = (currentHour + i) % 24;
                const temp = Math.round(hourly.temperature_2m[currentHour + i]);
                const emoji = getWeatherEmoji(hourly.weather_code[currentHour + i]);
                forecastHtml.push(`
                    <div class="hourly-forecast-item">
                        <div class="forecast-hour">${hour}:00</div>
                        <div class="forecast-emoji">${emoji}</div>
                        <div class="forecast-temp">${temp}°</div>
                    </div>
                `);
            }

            const html = `
                <div class="weather-current">
                    <div class="weather-emoji-large">${getWeatherEmoji(current.weather_code)}</div>
                    <div class="weather-temp-large">${Math.round(current.temperature_2m)}°</div>
                    <div class="weather-humidity">${current.relative_humidity_2m}% humidity</div>
                </div>
                <div class="hourly-forecast">
                    ${forecastHtml.join('')}
                </div>
            `;

            document.getElementById('weatherWidget').innerHTML = html;

            // Parse emojis in weather widget
            if (typeof twemoji !== 'undefined') {
                twemoji.parse(document.getElementById('weatherWidget'), {
                    folder: 'svg',
                    ext: '.svg'
                });
            }
        }

        // ====== CALENDAR INTEGRATION ======

        // Fetch calendar events from Google Apps Script
        async function fetchCalendarEvents() {
            if (!CONFIG.calendar || !CONFIG.calendar.enabled || !SHEETS_API_URL) {
                console.log('Calendar not configured or disabled');
                return null;
            }

            try {
                const days = CONFIG.calendar.daysAhead || 7;
                const url = `${SHEETS_API_URL}?action=getCalendarEvents&days=${days}&t=${Date.now()}`;
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                if (data.success && data.events) {
                    console.log('Fetched calendar events:', data.events.length);
                    return data.events;
                }

                return null;
            } catch (error) {
                console.error('Error fetching calendar:', error);
                return null;
            }
        }

        // Format date for display
        function formatEventDate(isoString, allDay) {
            const date = new Date(isoString);
            const today = new Date();
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);

            const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

            if (allDay) {
                return dateStr;
            }

            const timeStr = date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

            // Check if today or tomorrow
            if (date.toDateString() === today.toDateString()) {
                return `Today ${timeStr}`;
            } else if (date.toDateString() === tomorrow.toDateString()) {
                return `Tom ${timeStr}`;
            }

            return `${dateStr} ${timeStr}`;
        }

        // Update calendar widget display
        async function updateCalendar() {
            const calendarWidget = document.getElementById('calendarWidget');

            if (!CONFIG.calendar || !CONFIG.calendar.enabled) {
                calendarWidget.innerHTML = '<div style="text-align: center; color: #999; font-size: 12px; padding: 10px;">Calendar disabled</div>';
                return;
            }

            const events = await fetchCalendarEvents();

            if (!events) {
                calendarWidget.innerHTML = '<div style="text-align: center; color: #999; font-size: 12px; padding: 10px;">Calendar unavailable<br><small>Check Google Apps Script</small></div>';
                return;
            }

            if (events.length === 0) {
                calendarWidget.innerHTML = '<div style="text-align: center; color: #999; font-size: 12px; padding: 10px;">No upcoming events</div>';
                return;
            }

            // Show next 5 events
            const eventsHtml = events.slice(0, 5).map(event => {
                const timeDisplay = formatEventDate(event.start, event.allDay);
                const titleTruncated = event.title.length > 25 ? event.title.substring(0, 25) + '...' : event.title;

                return `
                    <div class="calendar-event">
                        <div class="event-time">${timeDisplay}</div>
                        <div class="event-title">${titleTruncated}</div>
                    </div>
                `;
            }).join('');

            const html = `
                <div class="calendar-header">Upcoming Events</div>
                ${eventsHtml}
            `;

            calendarWidget.innerHTML = html;
        }

        // PIN Number Pad Functions
        function addPinDigit(digit) {
            if (enteredPin.length < 4) {
                enteredPin += digit;
                updatePinDisplay();
                clearPinError();
            }
        }

        function backspacePin() {
            enteredPin = enteredPin.slice(0, -1);
            updatePinDisplay();
        }

        function clearPin() {
            enteredPin = '';
            updatePinDisplay();
        }

        function updatePinDisplay() {
            const display = document.getElementById('pinDisplay');
            if (enteredPin.length === 0) {
                display.textContent = '○○○○';
            } else {
                // Show filled circles for entered digits, empty circles for remaining
                display.textContent = '●'.repeat(enteredPin.length) + '○'.repeat(4 - enteredPin.length);
            }

            // Add a pulse animation to the display when a digit is added
            display.classList.add('pulse');
            setTimeout(() => {
                display.classList.remove('pulse');
            }, 200);
        }

        // Generate kid cards dynamically
        function generateKidCards() {
            const container = document.getElementById('kidsContainer');
            container.innerHTML = '';

            Object.values(CONFIG).forEach(kid => {
                if (kid.id) { // Skip non-kid config items
                    const card = `
                        <div class="kid-card">
                            <div class="kid-name">${kid.name}</div>

                            <div class="currency-section">
                                <div class="points-label">Daily BP (Today)</div>
                                <div class="points-display" id="${kid.id}-daily-bp">${kid.defaultDailyBP}</div>
                                <div class="button-group">
                                    <button class="minus-btn" onclick="adjustDailyBP('${kid.id}', -1)">−</button>
                                    <button class="plus-btn" onclick="adjustDailyBP('${kid.id}', 1)">+</button>
                                </div>
                            </div>

                            <div class="currency-section total-bp-section">
                                <div class="points-label">Total BP (Bank)</div>
                                <div class="points-display total-bp-display" id="${kid.id}-total-bp">${kid.defaultTotalBP}</div>
                                <div class="button-group">
                                    <button class="end-of-day-btn" onclick="endOfDay('${kid.id}')">End of Day (Add to Bank)</button>
                                </div>
                            </div>

                            <div class="currency-section prize-coins-section">
                                <div class="points-label">Prize Coins</div>
                                <div class="points-display prize-coins-display" id="${kid.id}-pc">${kid.defaultPrizeCoins}</div>
                                <div class="button-group">
                                    <button class="cash-in-btn" onclick="cashInPoints('${kid.id}')">Cash In (50 BP → 100 PC)</button>
                                </div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                }
            });
        }

        // Initialize points from Google Sheets or localStorage
        async function initializePoints() {
            const today = new Date().toDateString();
            const lastReset = localStorage.getItem('lastReset');

            // Try to fetch from Google Sheets first
            if (SHEETS_API_URL) {
                const sheetPoints = await fetchPointsFromSheets();

                if (sheetPoints) {
                    useGoogleSheets = true;
                    console.log('Using Google Sheets as data source');

                    // Update UI with points from sheet
                    Object.values(CONFIG).forEach(kid => {
                        if (kid.id) {
                            const kidData = sheetPoints[kid.id.toLowerCase()];
                            const dailyBP = kidData ? kidData.dailyBP : kid.defaultDailyBP;
                            const totalBP = kidData ? kidData.totalBP : kid.defaultTotalBP;
                            const pc = kidData ? kidData.prizeCoins : kid.defaultPrizeCoins;

                            const dailyBPElement = document.getElementById(`${kid.id}-daily-bp`);
                            const totalBPElement = document.getElementById(`${kid.id}-total-bp`);
                            const pcElement = document.getElementById(`${kid.id}-pc`);

                            if (dailyBPElement) dailyBPElement.textContent = dailyBP;
                            if (totalBPElement) totalBPElement.textContent = totalBP;
                            if (pcElement) pcElement.textContent = pc;

                            // Also save to localStorage as backup
                            localStorage.setItem(`${kid.id}-daily-bp`, dailyBP.toString());
                            localStorage.setItem(`${kid.id}-total-bp`, totalBP.toString());
                            localStorage.setItem(`${kid.id}-pc`, pc.toString());
                        }
                    });

                    showMessage('📊 Loaded from Google Sheets');
                    return;
                }
            }

            // Fallback to localStorage
            console.log('Using localStorage as data source');
            useGoogleSheets = false;

            // Initialize points if not set (first time only)
            Object.values(CONFIG).forEach(kid => {
                if (kid.id) {
                    // Only set defaults if nothing exists (first time setup)
                    if (!localStorage.getItem(`${kid.id}-daily-bp`)) {
                        localStorage.setItem(`${kid.id}-daily-bp`, kid.defaultDailyBP.toString());
                    }
                    if (!localStorage.getItem(`${kid.id}-total-bp`)) {
                        localStorage.setItem(`${kid.id}-total-bp`, kid.defaultTotalBP.toString());
                    }
                    if (!localStorage.getItem(`${kid.id}-pc`)) {
                        localStorage.setItem(`${kid.id}-pc`, kid.defaultPrizeCoins.toString());
                    }
                }
            });

            // Load points from localStorage
            Object.values(CONFIG).forEach(kid => {
                if (kid.id) {
                    const dailyBP = localStorage.getItem(`${kid.id}-daily-bp`) || kid.defaultDailyBP.toString();
                    const totalBP = localStorage.getItem(`${kid.id}-total-bp`) || kid.defaultTotalBP.toString();
                    const pc = localStorage.getItem(`${kid.id}-pc`) || kid.defaultPrizeCoins.toString();

                    const dailyBPElement = document.getElementById(`${kid.id}-daily-bp`);
                    const totalBPElement = document.getElementById(`${kid.id}-total-bp`);
                    const pcElement = document.getElementById(`${kid.id}-pc`);

                    if (dailyBPElement) dailyBPElement.textContent = dailyBP;
                    if (totalBPElement) totalBPElement.textContent = totalBP;
                    if (pcElement) pcElement.textContent = pc;
                }
            });

            if (!SHEETS_API_URL) {
                showMessage('💾 Using offline mode');
            }
        }

        // Get kid config by ID
        function getKidByID(kidId) {
            return Object.values(CONFIG).find(kid => kid.id === kidId);
        }

        // PIN Modal Functions
        function showPinModal(type = 'parent', kidId = null, action = null, callback = null) {
            pinContext.type = type;
            pinContext.kidId = kidId;
            pinContext.action = action;
            pinContext.callback = callback;

            enteredPin = '';
            updatePinDisplay();

            // Update modal title based on context
            const titleElement = document.getElementById('pinModalTitle');
            if (type === 'parent') {
                titleElement.textContent = 'Enter Parent PIN';
            } else if (type === 'kid') {
                const kid = getKidByID(kidId);
                if (action === 'cash-in') {
                    titleElement.textContent = `${kid.name}, Enter Your PIN to Cash In`;
                } else if (action === 'purchase') {
                    titleElement.textContent = `${kid.name}, Enter Your PIN to Purchase`;
                } else {
                    titleElement.textContent = `${kid.name}, Enter Your PIN`;
                }
            }

            document.getElementById('pinModal').classList.add('active');
        }

        function closePinModal() {
            document.getElementById('pinModal').classList.remove('active');
            enteredPin = '';
            clearPinError();
            pinContext = {
                type: 'parent',
                kidId: null,
                action: null,
                callback: null
            };
        }

        // Show error message in the PIN modal
        function showPinError(message) {
            const errorElement = document.getElementById('pinError');
            errorElement.textContent = message;
            errorElement.style.display = 'block';

            // Auto-hide after 3 seconds
            setTimeout(() => {
                clearPinError();
            }, 3000);
        }

        // Clear error message in the PIN modal
        function clearPinError() {
            const errorElement = document.getElementById('pinError');
            errorElement.textContent = '';
            errorElement.style.display = 'none';
        }

        function lockDashboard() {
            isUnlocked = false;
            clearTimeout(unlockTimeout);
            document.getElementById('unlockIndicator').classList.remove('active');
            showMessage('🔒 Dashboard locked!');
        }

        function checkPin() {
            let pinValid = false;

            // Check if it's a parent PIN request
            if (pinContext.type === 'parent') {
                // Convert CONFIG.pin to string for comparison (it's stored as a number in Config sheet)
                if (enteredPin === CONFIG.pin.toString()) {
                    pinValid = true;
                    isUnlocked = true;
                    closePinModal();
                    showMessage('Unlocked! You can now edit points.');

                    // Show unlock indicator
                    document.getElementById('unlockIndicator').classList.add('active');

                    // Auto-lock after 2 minutes of inactivity
                    clearTimeout(unlockTimeout);
                    unlockTimeout = setTimeout(() => {
                        isUnlocked = false;
                        document.getElementById('unlockIndicator').classList.remove('active');
                        showMessage('Auto-locked for security');
                    }, 120000); // 2 minutes
                }
            }
            // Check if it's a kid PIN request
            else if (pinContext.type === 'kid') {
                const kid = getKidByID(pinContext.kidId);
                if (kid && kid.pin && enteredPin === kid.pin.toString()) {
                    pinValid = true;

                    // Capture callback before closing modal (closePinModal resets pinContext)
                    const callback = pinContext.callback;

                    closePinModal();
                    showMessage(`✓ Welcome, ${kid.name}!`);

                    // Execute the callback function if provided
                    if (callback) {
                        callback();
                    }
                }
            }

            // Handle incorrect PIN
            if (!pinValid) {
                showPinError('❌ Incorrect PIN!');
                enteredPin = '';
                updatePinDisplay();
            }
        }

        // Adjust daily behavior points for a kid
        async function adjustDailyBP(kidId, change) {
            // Check if PIN is required and user is not unlocked
            if (CONFIG.requirePinForEdits && !isUnlocked) {
                showPinModal();
                return;
            }

            // Reset the auto-lock timer
            if (isUnlocked) {
                clearTimeout(unlockTimeout);
                unlockTimeout = setTimeout(() => {
                    isUnlocked = false;
                    document.getElementById('unlockIndicator').classList.remove('active');
                    showMessage('Auto-locked for security');
                }, 120000);
            }

            const kid = getKidByID(kidId);
            if (!kid) return;

            const dailyBPElement = document.getElementById(`${kidId}-daily-bp`);
            let currentDailyBP = parseInt(dailyBPElement.textContent);
            let newDailyBP = currentDailyBP + change;

            // Don't go below 0
            if (newDailyBP < 0) {
                showMessage(`${kid.name} already at 0 daily points!`);
                return;
            }

            // Update UI immediately
            dailyBPElement.textContent = newDailyBP;

            // Save to localStorage (always, as backup)
            localStorage.setItem(`${kidId}-daily-bp`, newDailyBP.toString());

            const actionPast = change > 0 ? 'earned' : 'lost';
            showMessage(`${kid.name} ${actionPast} a daily point! Now at ${newDailyBP} today`);

            // Save to Google Sheets if configured
            if (useGoogleSheets && SHEETS_API_URL) {
                const totalBPElement = document.getElementById(`${kidId}-total-bp`);
                const pcElement = document.getElementById(`${kidId}-pc`);
                const currentTotalBP = parseInt(totalBPElement.textContent);

        // Cash in total behavior points for prize coins
        async function cashInPoints(kidId) {
            const kid = getKidByID(kidId);
            if (!kid) return;

            // If kid has a PIN, require kid PIN. Otherwise, allow without authentication.
            if (kid.pin) {
                // Request kid PIN
                showPinModal('kid', kidId, 'cash-in', () => performCashIn(kidId));
                return;
            }

            // No kid PIN, proceed with cash-in
            await performCashIn(kidId);

        // Perform the actual cash-in operation
        async function performCashIn(kidId) {
            const kid = getKidByID(kidId);
            if (!kid) return;

            const dailyBPElement = document.getElementById(`${kidId}-daily-bp`);
            const totalBPElement = document.getElementById(`${kidId}-total-bp`);
            const pcElement = document.getElementById(`${kidId}-pc`);
            let currentDailyBP = parseInt(dailyBPElement.textContent);
            let currentTotalBP = parseInt(totalBPElement.textContent);
            let currentPC = parseInt(pcElement.textContent);

            // Check if they have enough Total BP to cash in
            if (currentTotalBP < CONFIG.conversionRate.bp) {
                showMessage(`${kid.name} needs ${CONFIG.conversionRate.bp} Total BP to cash in! Currently has ${currentTotalBP} in bank.`);
                return;
            }

            // Perform conversion (subtract from Total BP, add to PC)
            const newTotalBP = currentTotalBP - CONFIG.conversionRate.bp;
            const newPC = currentPC + CONFIG.conversionRate.pc;

            // Update UI
            totalBPElement.textContent = newTotalBP;
            pcElement.textContent = newPC;

            // Save to localStorage
            localStorage.setItem(`${kidId}-total-bp`, newTotalBP.toString());
            localStorage.setItem(`${kidId}-pc`, newPC.toString());

            showMessage(`${kid.name} cashed in ${CONFIG.conversionRate.bp} Total BP for ${CONFIG.conversionRate.pc} PC! Bank: ${newTotalBP} BP, PC: ${newPC}`);

            // Save to Google Sheets if configured
            if (useGoogleSheets && SHEETS_API_URL) {
                await savePointsToSheets(kidId, currentDailyBP, newTotalBP, newPC, 'cash-in', `Converted ${CONFIG.conversionRate.bp} Total BP to ${CONFIG.conversionRate.pc} PC`);
            }
        }

        // ====== CHORES FUNCTIONALITY ======

        // Get chore completion status from localStorage
        function getChoreStatus(kidId, choreId) {
            const today = new Date().toDateString();
            const key = `chore-${kidId}-${choreId}-${today}`;
            return localStorage.getItem(key) || 'incomplete'; // 'incomplete', 'pending', 'approved'
        }

        // Set chore completion status in localStorage
        function setChoreStatus(kidId, choreId, status) {
            const today = new Date().toDateString();
            const key = `chore-${kidId}-${choreId}-${today}`;
            localStorage.setItem(key, status);
        }

        // Approve chore completion (awards BP)
        async function approveChore(kidId, choreId, choreName, bp, multiplier = 1) {
            // Check if PIN is required and user is not unlocked
            if (CONFIG.requirePinForEdits && !isUnlocked) {
                showPinModal();
                return;
            }

            const kid = getKidByID(kidId);
            if (!kid) return;

            // Mark as approved
            setChoreStatus(kidId, choreId, 'approved');

            // Calculate total BP with multiplier
            const totalBP = bp * multiplier;

            // Award BP
            const dailyBPElement = document.getElementById(`${kidId}-daily-bp`);
            let currentDailyBP = parseInt(dailyBPElement.textContent);
            let newDailyBP = currentDailyBP + totalBP;

            // Update UI
            dailyBPElement.textContent = newDailyBP;
            localStorage.setItem(`${kidId}-daily-bp`, newDailyBP.toString());

            // Save to Google Sheets if configured
            if (useGoogleSheets && SHEETS_API_URL) {
                const totalBPElement = document.getElementById(`${kidId}-total-bp`);
                const pcElement = document.getElementById(`${kidId}-pc`);
                const currentTotalBP = parseInt(totalBPElement.textContent);
                const currentPC = parseInt(pcElement.textContent);
                const note = multiplier > 1 ? `Completed chore: ${choreName} (+${bp}×${multiplier} = ${totalBP} BP)` : `Completed chore: ${choreName} (+${totalBP} BP)`;
                await savePointsToSheets(kidId, newDailyBP, currentTotalBP, currentPC, 'chore-approved', note);
            }

            renderChores();
            const bpMessage = multiplier > 1 ? `${bp}×${multiplier} = ${totalBP} BP` : `${totalBP} BP`;
            showMessage(`✅ Approved! ${kid.name} earned ${bpMessage} for: ${choreName}`);
        }

        // Reject chore completion
        function rejectChore(kidId, choreId) {
            // Check if PIN is required and user is not unlocked
            if (CONFIG.requirePinForEdits && !isUnlocked) {
                showPinModal();
                return;
            }

            const kid = getKidByID(kidId);
            if (!kid) return;

            // Reset to incomplete
            setChoreStatus(kidId, choreId, 'incomplete');
            renderChores();
            showMessage(`❌ Rejected chore for ${kid.name}`);
        }

        // Reset all chores to incomplete
        function resetAllChores() {
            // Check if PIN is required and user is not unlocked
            if (CONFIG.requirePinForEdits && !isUnlocked) {
                showPinModal();
                return;
            }

            const today = new Date().toDateString();
            const keys = Object.keys(localStorage);

            // Remove all chore status keys for today
            keys.forEach(key => {
                if (key.startsWith('chore-') && key.endsWith(today)) {
                    localStorage.removeItem(key);
                }
            });

            renderChores();
            showMessage('🔄 All chores reset!');
        }

        // Render chores section (compact view)
        function renderChores() {
            if (!CHORES) {
                document.getElementById('choresContainer').innerHTML = '<div style="text-align: center; color: #999;">No chores configured</div>';
                return;
            }

            const container = document.getElementById('choresContainer');
            let html = '<div class="chore-list">';
            let allChores = [];

            // Collect all shared chores first
            if (CHORES.shared && CHORES.shared.length > 0) {
                CHORES.shared.forEach(chore => {
                    allChores.push({
                        ...chore,
                        kidId: null,
                        isShared: true,
                        displayName: chore.name
                    });
                });
            }

            // Collect all individual chores
            Object.values(CONFIG).forEach(kid => {
                if (kid.id && CHORES.individual && CHORES.individual[kid.id]) {
                    CHORES.individual[kid.id].forEach(chore => {
                        allChores.push({
                            ...chore,
                            kidId: kid.id,
                            kidName: kid.name,
                            isShared: false,
                            displayName: chore.name
                        });
                    });
                }
            });

            // Render all chores in one compact list
            allChores.forEach(chore => {
                let status = 'incomplete';
                let assignedKidId = chore.kidId;

                // For shared chores, check if any kid completed it
                if (chore.isShared) {
                    Object.values(CONFIG).forEach(kid => {
                        if (kid.id) {
                            const kidStatus = getChoreStatus(kid.id, chore.id);
                            if (kidStatus === 'approved' || kidStatus === 'pending') {
                                status = kidStatus;
                                assignedKidId = kid.id;
                            }
                        }
                    });
                } else {
                    status = getChoreStatus(chore.kidId, chore.id);
                }

                const statusClass = status === 'approved' ? 'approved' : status === 'pending' ? 'pending' : 'incomplete';
                const statusIcon = status === 'approved' ? '✅' : status === 'pending' ? '⏳' : '⬜';
                const totalBP = chore.bp * (chore.multiplier || 1);
                const bpDisplay = chore.multiplier > 1 ? `+${chore.bp}×${chore.multiplier} (${totalBP} BP)` : `+${chore.bp} BP`;

                html += `
                    <div class="chore-item ${statusClass}">
                        <div class="chore-info">
                            <span class="chore-status-icon">${statusIcon}</span>
                            <span class="chore-name">${chore.displayName}</span>
                            <span class="chore-bp">${bpDisplay}</span>
                        </div>
                        <div class="chore-actions">`;

                if (status === 'incomplete') {
                    if (chore.isShared) {
                        html += `<button class="chore-btn complete-btn" onclick="showChoreKidSelector('${chore.id}', '${chore.name}', ${chore.bp}, ${chore.multiplier || 1})">Mark Done</button>`;
                    } else {
                        html += `<button class="chore-btn complete-btn" onclick="markChoreCompleteForKid('${chore.kidId}', '${chore.id}')">Mark Done</button>`;
                    }
                } else if (status === 'pending') {
                    html += `
                        <button class="chore-btn approve-btn" onclick="approveChore('${assignedKidId}', '${chore.id}', '${chore.name}', ${chore.bp}, ${chore.multiplier || 1})">Approve</button>
                        <button class="chore-btn reject-btn" onclick="rejectChore('${assignedKidId}', '${chore.id}')">Reject</button>`;
                } else {
                    html += `<span class="approved-text">Completed!</span>`;
                }

                html += `</div></div>`;
            });

            html += '</div>';
            container.innerHTML = html;

            // Parse emojis in chores section
            if (typeof twemoji !== 'undefined') {
                twemoji.parse(document.getElementById('choresContainer'), {
                    folder: 'svg',
                    ext: '.svg'
                });
            }
        }

        // ====== ACTIVITIES FUNCTIONALITY ======

        // Get the current week key (YYYY-WXX format, e.g., "2026-W11")
        function getCurrentWeekKey() {
            const now = new Date();
            const startOfYear = new Date(now.getFullYear(), 0, 1);
            const days = Math.floor((now - startOfYear) / (24 * 60 * 60 * 1000));
            const weekNumber = Math.ceil((days + startOfYear.getDay() + 1) / 7);
            return `${now.getFullYear()}-W${weekNumber.toString().padStart(2, '0')}`;
        }

        // Get activity completion count for current week
        function getActivityCount(kidId, activityId) {
            const weekKey = getCurrentWeekKey();
            const key = `activity-${kidId}-${activityId}-${weekKey}`;
            return parseInt(localStorage.getItem(key)) || 0;
        }

        // Increment activity completion count
        function incrementActivityCount(kidId, activityId) {
            const weekKey = getCurrentWeekKey();
            const key = `activity-${kidId}-${activityId}-${weekKey}`;
            const currentCount = getActivityCount(kidId, activityId);
            localStorage.setItem(key, currentCount + 1);
        }

        // Complete activity (awards BP immediately, no approval needed)
        async function completeActivity(kidId, activityId, activityName, bp, multiplier, maxPerWeek) {
            const kid = getKidByID(kidId);
            if (!kid) return;

            // Check if under the limit
            const currentCount = getActivityCount(kidId, activityId);
            if (currentCount >= maxPerWeek) {
                showMessage(`${kid.name} has already completed this activity ${maxPerWeek} times this week!`);
                return;
            }

            // Increment count
            incrementActivityCount(kidId, activityId);

            // Calculate total BP with multiplier
            const totalBP = bp * multiplier;

            // Award BP immediately
            kid.dailyBP += totalBP;

            // Save to Google Sheets
            if (useGoogleSheets) {
                await savePointsToSheets(kid.id, kid.dailyBP, kid.totalBP, kid.prizeCoins, 'activity', `Completed activity: ${activityName} (+${totalBP} BP)`);
            }

            // Update UI
            updateKidDisplay(kid.id);
            renderActivities();

            const newCount = getActivityCount(kidId, activityId);
            showMessage(`🌟 ${kid.name} completed "${activityName}"! Earned ${totalBP} BP (${newCount}/${maxPerWeek} this week)`);
        }

                    html += `
                        <div class="kid-selector-card ${disabledClass}" onclick="confirmPurchase('${kid.id}')">
                            <div class="kid-selector-name">${kid.name}</div>
                            <div class="kid-selector-pc">${currentPC} PC</div>
                            ${canAfford ? '<div class="kid-selector-status">✓</div>' : '<div class="kid-selector-status">Not enough</div>'}
                        </div>
                    `;
                }
            });

            html += '</div>';

            document.getElementById('kidSelectorContent').innerHTML = html;
            document.getElementById('kidSelectorModal').classList.add('active');
        }

        // Close kid selector modal
        function closeKidSelector() {
            document.getElementById('kidSelectorModal').classList.remove('active');
            selectedReward = null;
        }

        // Confirm purchase for selected kid
        async function confirmPurchase(kidId) {
            const kid = getKidByID(kidId);
            if (!kid || !selectedReward) return;

            const pcElement = document.getElementById(`${kidId}-pc`);
            const currentPC = parseInt(pcElement.textContent);

            if (currentPC < selectedReward.cost) {
                showMessage(`${kid.name} needs ${selectedReward.cost} PC but only has ${currentPC} PC!`);
                return;
            }

            // Capture the reward before closing selector (closeKidSelector sets selectedReward to null)
            const reward = selectedReward;

            // Close kid selector first
            closeKidSelector();

            // If kid has a PIN, require kid PIN. Otherwise, allow without PIN.
            if (kid.pin) {
                // Request kid PIN
                showPinModal('kid', kidId, 'purchase', () => performPurchase(kidId, reward));
                return;
            }

            // No kid PIN required, proceed with purchase
            await performPurchase(kidId, reward);
        }

        // Perform the actual purchase operation
        async function performPurchase(kidId, reward) {
            const kid = getKidByID(kidId);
            if (!kid || !reward) return;

            const pcElement = document.getElementById(`${kidId}-pc`);
            const currentPC = parseInt(pcElement.textContent);

            // Double-check they can still afford it
            if (currentPC < reward.cost) {
                showMessage(`${kid.name} needs ${reward.cost} PC but only has ${currentPC} PC!`);
                return;
            }

            // Deduct Prize Coins
            const newPC = currentPC - reward.cost;
            pcElement.textContent = newPC;
            localStorage.setItem(`${kidId}-pc`, newPC.toString());

            // Save to Google Sheets if configured
            if (useGoogleSheets && SHEETS_API_URL) {
                const dailyBPElement = document.getElementById(`${kidId}-daily-bp`);
                const totalBPElement = document.getElementById(`${kidId}-total-bp`);
                const currentDailyBP = parseInt(dailyBPElement.textContent);
                const currentTotalBP = parseInt(totalBPElement.textContent);
                await savePointsToSheets(kidId, currentDailyBP, currentTotalBP, newPC, 'reward-purchase', `Purchased: ${reward.name} ${reward.icon} (-${reward.cost} PC)`);
            }

            showMessage(`🎉 ${kid.name} purchased ${reward.icon} ${reward.name} for ${reward.cost} PC! Remaining: ${newPC} PC`);
        }

        // Render rewards section
        function renderRewards() {
            if (!REWARDS || REWARDS.length === 0) {
                document.getElementById('rewardsContainer').innerHTML = '<div style="text-align: center; color: #999;">No rewards configured</div>';
                return;
            }

            const container = document.getElementById('rewardsContainer');
            let html = '';

            REWARDS.forEach(reward => {
                html += `
                    <div class="reward-card">
                        <div class="reward-icon">${reward.icon}</div>
                        <div class="reward-name">${reward.name}</div>
                        <div class="reward-cost">${reward.cost} PC</div>
                        <button class="reward-btn" onclick="showKidSelector('${reward.id}', '${reward.name}', ${reward.cost}, '${reward.icon}')">Purchase</button>
                    </div>
                `;
            });

            container.innerHTML = html;

            // Parse emojis in rewards section
            if (typeof twemoji !== 'undefined') {
                twemoji.parse(document.getElementById('rewardsContainer'), {
                    folder: 'svg',
                    ext: '.svg'
                });
            }
        }

        // Update date and time
        function updateDateTime() {
            const now = new Date();

            // Update clock time (12-hour format with AM/PM)
            let hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; // 0 should be 12
            const timeElement = document.getElementById('clockTime');
            if (timeElement) {
                timeElement.textContent = `${hours}:${minutes}:${seconds} ${ampm}`;
            }

            // Update clock date
            const dateOptions = {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            };
            const dateElement = document.getElementById('clockDate');
            if (dateElement) {
                dateElement.textContent = now.toLocaleDateString('en-US', dateOptions);
            }
        }

        // Reset daily BP to 5 at midnight
        async function checkForMidnight() {
            const now = new Date();
            const lastReset = localStorage.getItem('lastDailyReset');
            const today = now.toDateString();

            if (lastReset !== today && now.getHours() === 0 && now.getMinutes() === 0) {
                // Auto-reset bypasses PIN requirement
                Object.values(CONFIG).forEach(kid => {
                    if (kid.id) {
                        const dailyBPElement = document.getElementById(`${kid.id}-daily-bp`);
                        if (dailyBPElement) {
                            dailyBPElement.textContent = kid.defaultDailyBP; // Reset to 5
                            localStorage.setItem(`${kid.id}-daily-bp`, kid.defaultDailyBP.toString());

                            // Save to Google Sheets if configured
                            if (useGoogleSheets && SHEETS_API_URL) {
                                const totalBPElement = document.getElementById(`${kid.id}-total-bp`);
                                const pcElement = document.getElementById(`${kid.id}-pc`);
                                const currentTotalBP = parseInt(totalBPElement.textContent);
                                const currentPC = parseInt(pcElement.textContent);
                                savePointsToSheets(kid.id, kid.defaultDailyBP, currentTotalBP, currentPC, 'midnight-reset', 'Daily BP reset to 5');
                            }
                        }
                    }
                });
                localStorage.setItem('lastDailyReset', today);
                showMessage('🌅 New day! Daily BP reset to 5 for everyone.');
            }
        }

        // Auto-save to Google Sheets at 9pm Eastern (before Pi shutdown)
        async function checkFor9pmSave() {
            // Get current time in Eastern timezone
            const now = new Date();
            const easternTimeString = now.toLocaleString('en-US', { timeZone: 'America/New_York' });
            const easternTime = new Date(easternTimeString);
            const hour = easternTime.getHours();
            const minute = easternTime.getMinutes();

            // Check if it's 9:00 PM Eastern and we haven't saved yet today
            const lastSaveDate = localStorage.getItem('lastAutoSave');
            const todayString = easternTime.toDateString();

            if (hour === 21 && minute === 0 && lastSaveDate !== todayString) {
                console.log('9pm Eastern - Auto-saving to Google Sheets...');

                if (useGoogleSheets && SHEETS_API_URL) {
                    // Save current points for all kids
                    for (const kid of Object.values(CONFIG)) {
                        if (kid.id) {
                            const dailyBP = parseInt(document.getElementById(`${kid.id}-daily-bp`)?.textContent || kid.defaultDailyBP);
                            const totalBP = parseInt(document.getElementById(`${kid.id}-total-bp`)?.textContent || kid.defaultTotalBP);
                            const pc = parseInt(document.getElementById(`${kid.id}-pc`)?.textContent || kid.defaultPrizeCoins);
                            await savePointsToSheets(kid.id, dailyBP, totalBP, pc, 'auto-save', 'End of day auto-save');
                        }
                    }

                    localStorage.setItem('lastAutoSave', todayString);
                    showMessage('✅ Auto-saved to Google Sheets');
                    console.log('Auto-save complete!');
                }
            }
        }

        // Initialize on load
        async function initialize() {
            // Load dark mode preference first
            loadDarkMode();

            // Load config first
            CONFIG = await fetchConfig();

            if (!CONFIG) {
                document.body.innerHTML = '<div style="color: white; text-align: center; padding: 50px; font-size: 20px;">⚠️ Failed to load configuration from Google Sheets.<br><br>Please check your Config sheet setup.</div>';
                return;
            }

            // Load chores, rewards, and activities from separate sheets
            CHORES = await fetchChores();
            REWARDS = await fetchRewards();
            ACTIVITIES = await fetchActivities();

            // Initialize dashboard
            generateKidCards();
            await initializePoints();
            updateDateTime();
            updateWeather();
            updateCalendar();
            renderChores();
            renderRewards();
            renderActivities();

            // Parse emojis with Twemoji (converts emoji to images)
            if (typeof twemoji !== 'undefined') {
                twemoji.parse(document.body, {
                    folder: 'svg',
                    ext: '.svg'
                });
            }
        }

        initialize();

        // Update time every second
        setInterval(updateDateTime, 1000);

        // Update weather every 10 minutes
        setInterval(updateWeather, 600000);

        // Update calendar every 15 minutes
        setInterval(updateCalendar, 900000);

        // Check for midnight every minute
        setInterval(checkForMidnight, 60000);

        // Check for 9pm save every minute
        setInterval(checkFor9pmSave, 60000);
    </script>
</body>
</html>
