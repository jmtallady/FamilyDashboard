<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@twemoji/api@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="dashboard-layout">
        <!-- Left Sidebar: Clock, Weather -->
        <div class="sidebar">
            <div class="clock-widget">
                <div class="clock-time" id="clockTime">12:00:00</div>
                <div class="clock-date" id="clockDate">Loading...</div>
            </div>

            <div class="weather-widget" id="weatherWidget">
                <!-- Weather will be added here -->
            </div>

            <div class="recent-activity-sidebar">
                <div class="section-header">
                    <h2>📋 Recent Activity</h2>
                </div>
                <div id="recentActivityContainer">
                    <!-- Recent activities will be dynamically generated -->
                </div>
            </div>
        </div>

        <!-- Main Content: Kids Cards and Rewards -->
        <div class="main-content">
            <div class="header">
                <div class="header-btns header-btns-left">
                    <label for="colorScheme">🎨</label>
                    <select id="colorScheme" onchange="changeColorScheme(this.value)">
                        <option value="purple">Purple</option>
                        <option value="pink">Pink</option>
                        <option value="blue">Blue</option>
                        <option value="green">Green</option>
                        <option value="teal">Teal</option>
                        <option value="orange">Orange</option>
                        <option value="light-pink">Light Pink</option>
                    </select>
                    <div class="house-rules-btn" onclick="toggleDarkMode()">
                        <span id="darkModeIcon">🌙</span>
                    </div>
                </div>
                <h1>Family Dashboard</h1>
                <div class="header-btns header-btns-right">
                    <button class="house-rules-btn" onclick="showHouseRules()" title="View House Rules">📋</button>
                    <button class="house-rules-btn parent-dash-btn" onclick="openParentDashboard()" title="Parent Dashboard">
                        👪
                        <span class="pending-badge" id="parentDashBadge" style="display:none;">0</span>
                    </button>
                </div>
            </div>

            <div class="kids-container" id="kidsContainer">
                <!-- Kids will be dynamically generated from CONFIG -->
            </div>

            <!-- Calendar Widget — full-width below kids -->
            <div class="calendar-widget calendar-main" id="calendarWidget">
                <!-- Calendar will be added here -->
            </div>

            <!-- Quick-access buttons row -->
            <div class="quick-access-row">
                <button class="quick-access-btn" onclick="openRewardsModal()">🎁 Rewards</button>
                <button class="quick-access-btn" onclick="openActivitiesModal()">⭐ Activities</button>
                <button class="quick-access-btn dinner-request-btn" onclick="openDinnerRequestModal()">🍽️ Request Dinner</button>
            </div>
        </div>

        <!-- Right Column: Chores -->
        <div class="right-column">
            <!-- Chores Section -->
            <div class="chores-section">
                <div class="section-header">
                    <h2>📋 Chores</h2>
                </div>
                <div id="choresContainer">
                    <!-- Chores will be dynamically generated -->
                </div>
            </div>
        </div>
    </div>

    <!-- PIN Modal -->
    <div class="pin-modal" id="pinModal">
        <div class="pin-content">
            <h2 id="pinModalTitle">Enter PIN to Edit</h2>
            <div class="pin-display" id="pinDisplay">••••</div>
            <div class="pin-error" id="pinError"></div>

            <div class="numpad">
                <button class="num-btn" onclick="addPinDigit('1')">1</button>
                <button class="num-btn" onclick="addPinDigit('2')">2</button>
                <button class="num-btn" onclick="addPinDigit('3')">3</button>
                <button class="num-btn" onclick="addPinDigit('4')">4</button>
                <button class="num-btn" onclick="addPinDigit('5')">5</button>
                <button class="num-btn" onclick="addPinDigit('6')">6</button>
                <button class="num-btn" onclick="addPinDigit('7')">7</button>
                <button class="num-btn" onclick="addPinDigit('8')">8</button>
                <button class="num-btn" onclick="addPinDigit('9')">9</button>
                <button class="num-btn clear-btn" onclick="clearPin()">Clear</button>
                <button class="num-btn" onclick="addPinDigit('0')">0</button>
                <button class="num-btn clear-btn" onclick="backspacePin()">⌫</button>
            </div>

            <div class="pin-buttons">
                <button class="pin-btn plus-btn" onclick="checkPin()">Unlock</button>
                <button class="pin-btn reset-btn" onclick="closePinModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Kid Selector Modal -->
    <div class="pin-modal" id="kidSelectorModal">
        <div class="pin-content">
            <div id="kidSelectorContent">
                <!-- Content will be dynamically generated -->
            </div>
            <div class="pin-buttons">
                <button class="pin-btn reset-btn" onclick="closeKidSelector()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- House Rules Modal -->
    <div class="pin-modal" id="houseRulesModal">
        <div class="house-rules-modal-content">
            <button class="modal-close-btn" onclick="closeHouseRules()" title="Close">✕</button>
            <div class="house-rules-scroll">
                <h2 style="text-align: center; margin-bottom: 20px;">📋 House Rules</h2>
                <div id="houseRulesContent" style="text-align: left;">
                    <!-- Content will be dynamically generated -->
                </div>
            </div>
        </div>
    </div>

    <!-- Parent Dashboard Slide-in Panel -->
    <div class="parent-dash-overlay" id="parentDashOverlay" onclick="closeParentDashboard()"></div>
    <div class="parent-dash-panel" id="parentDashPanel">
        <div class="parent-dash-header">
            <h2>👪 Parent Dashboard</h2>
            <button class="modal-close-btn" onclick="closeParentDashboard()" title="Close">✕</button>
        </div>
        <div class="parent-dash-section-title">Pending Approvals</div>
        <div id="parentDashContent">
            <!-- Dynamically rendered -->
        </div>
    </div>

    <!-- Unlock Indicator -->
    <div class="unlock-indicator" id="unlockIndicator" onclick="lockDashboard()">🔓 Unlocked (click to lock)</div>

    <!-- Reason Selection Modal -->
    <div class="pin-modal" id="reasonModal">
        <div class="pin-content" style="max-width:360px;">
            <h2 id="reasonModalTitle">Reason</h2>
            <div id="reasonStepperWrap"></div>
            <div id="reasonBtnGrid" class="reason-btn-grid"></div>
            <div id="reasonOtherWrap" style="display:none; margin-bottom:12px;">
                <input id="reasonOtherInput" class="chores-admin-input"
                       style="width:100%;font-size:14px;padding:8px 10px;"
                       type="text" placeholder="Describe reason…" maxlength="80">
            </div>
            <div id="reasonValidation" style="color:#ff6b6b;font-size:12px;min-height:18px;margin-bottom:8px;"></div>
            <div class="pin-buttons">
                <button class="pin-btn plus-btn" onclick="confirmAdjustment()">Confirm</button>
                <button class="pin-btn reset-btn" onclick="closeReasonModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Rewards Modal -->
    <div class="pin-modal" id="rewardsModal">
        <div class="panel-modal-content">
            <div class="panel-modal-header">
                <h2>🎁 Rewards</h2>
                <button class="modal-close-btn" onclick="closeRewardsModal()" title="Close">✕</button>
            </div>
            <div class="panel-modal-body">
                <div id="rewardsContainer">
                    <!-- Rewards will be dynamically generated -->
                </div>
            </div>
        </div>
    </div>

    <!-- Activities Modal -->
    <div class="pin-modal" id="activitiesModal">
        <div class="panel-modal-content">
            <div class="panel-modal-header">
                <h2>⭐ Activities</h2>
                <button class="modal-close-btn" onclick="closeActivitiesModal()" title="Close">✕</button>
            </div>
            <div class="panel-modal-body">
                <div id="activitiesContainer">
                    <!-- Activities will be dynamically generated -->
                </div>
            </div>
        </div>
    </div>

    <!-- Dinner Request Modal -->
    <div class="pin-modal" id="dinnerRequestModal">
        <div class="pin-content" style="max-width:400px;">
            <h2>🍽️ Request Dinner</h2>

            <div class="dinner-req-section-label">Who are you?</div>
            <div id="dinnerKidPicker" class="dinner-kid-grid">
                <!-- Kid buttons injected by JS -->
            </div>

            <div class="dinner-req-section-label" style="margin-top:14px;">Which night?</div>
            <div id="dinnerDatePicker" class="dinner-date-grid">
                <!-- Date chips injected by JS -->
            </div>

            <div class="dinner-req-section-label" style="margin-top:14px;">What would you like?</div>
            <div style="margin-bottom:8px;">
                <select id="dinnerMealSelect" class="chores-admin-input" style="width:100%;font-size:15px;padding:8px 10px;">
                    <option value="">Pick from menu…</option>
                </select>
            </div>
            <div style="margin-bottom:8px;">
                <input id="dinnerCustomMeal" type="text" placeholder="Or type your own…"
                    class="chores-admin-input" style="width:100%;font-size:15px;padding:8px 10px;" maxlength="80">
            </div>

            <div id="dinnerReqValidation" style="color:#ff6b6b;font-size:13px;min-height:18px;margin-bottom:8px;"></div>

            <div class="pin-buttons">
                <button class="pin-btn plus-btn" onclick="submitDinnerRequest()">Send Request</button>
                <button class="pin-btn reset-btn" onclick="closeDinnerRequestModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
