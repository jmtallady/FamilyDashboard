<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@twemoji/api@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="dashboard-layout">
        <!-- Left Sidebar: Clock, Weather, Calendar -->
        <div class="sidebar">
            <div class="dark-mode-toggle" onclick="toggleDarkMode()">
                <span id="darkModeIcon">🌙</span>
            </div>

            <div class="clock-widget">
                <div class="clock-time" id="clockTime">12:00:00</div>
                <div class="clock-date" id="clockDate">Loading...</div>
            </div>

            <div class="weather-widget" id="weatherWidget">
                <!-- Weather will be added here -->
            </div>

            <div class="calendar-widget" id="calendarWidget">
                <!-- Calendar will be added here -->
            </div>
        </div>

        <!-- Main Content: Kids Cards and Rewards -->
        <div class="main-content">
            <div class="header">
                <h1>Family Dashboard</h1>
                <div class="color-scheme-selector">
                    <button class="house-rules-btn" onclick="showHouseRules()" title="View House Rules">📋</button>
                    <button class="house-rules-btn parent-dash-btn" onclick="openParentDashboard()" title="Parent Dashboard">
                        👨‍👩‍👧
                        <span class="pending-badge" id="parentDashBadge" style="display:none;">0</span>
                    </button>
                    <label for="colorScheme">🎨</label>
                    <select id="colorScheme" onchange="changeColorScheme(this.value)">
                        <option value="purple">Purple</option>
                        <option value="pink">Pink</option>
                        <option value="blue">Blue</option>
                        <option value="green">Green</option>
                        <option value="teal">Teal</option>
                        <option value="orange">Orange</option>
                    </select>
                </div>
            </div>

            <div class="kids-container" id="kidsContainer">
                <!-- Kids will be dynamically generated from CONFIG -->
            </div>

            <div class="reset-container">
                <button class="reset-btn" onclick="endOfDayAll()">End of Day for All Kids</button>
            </div>

            <div class="status-message" id="statusMessage"></div>

            <!-- Two Column Layout: Rewards and Recent Activity -->
            <div class="rewards-activity-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; flex: 1; min-height: 0;">
                <!-- Rewards Section -->
                <div class="rewards-section" style="margin-top: 0; flex: 1; min-height: 0;">
                    <div class="section-header">
                        <h2>🎁 Rewards</h2>
                    </div>
                    <div id="rewardsContainer" style="overflow-y: auto; flex: 1;">
                        <!-- Rewards will be dynamically generated -->
                    </div>
                </div>

                <!-- Recent Activity Section -->
                <div class="rewards-section" style="margin-top: 0; flex: 1; min-height: 0;">
                    <div class="section-header">
                        <h2>📋 Recent Activity</h2>
                    </div>
                    <div id="recentActivityContainer" style="overflow-y: auto; flex: 1;">
                        <!-- Recent activities will be dynamically generated -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Column: Chores -->
        <div class="right-column">
            <!-- Chores Section -->
            <div class="chores-section">
                <div class="section-header">
                    <h2>📋 Chores</h2>
                </div>
                <div id="choresContainer">
                    <!-- Chores will be dynamically generated -->
                </div>
            </div>

            <!-- Activities Section -->
            <div class="chores-section">
                <div class="section-header">
                    <h2>⭐ Activities</h2>
                </div>
                <div id="activitiesContainer">
                    <!-- Activities will be dynamically generated -->
                </div>
            </div>
        </div>
    </div>

    <!-- PIN Modal -->
    <div class="pin-modal" id="pinModal">
        <div class="pin-content">
            <h2 id="pinModalTitle">Enter PIN to Edit</h2>
            <div class="pin-display" id="pinDisplay">••••</div>
            <div class="pin-error" id="pinError"></div>

            <div class="numpad">
                <button class="num-btn" onclick="addPinDigit('1')">1</button>
                <button class="num-btn" onclick="addPinDigit('2')">2</button>
                <button class="num-btn" onclick="addPinDigit('3')">3</button>
                <button class="num-btn" onclick="addPinDigit('4')">4</button>
                <button class="num-btn" onclick="addPinDigit('5')">5</button>
                <button class="num-btn" onclick="addPinDigit('6')">6</button>
                <button class="num-btn" onclick="addPinDigit('7')">7</button>
                <button class="num-btn" onclick="addPinDigit('8')">8</button>
                <button class="num-btn" onclick="addPinDigit('9')">9</button>
                <button class="num-btn clear-btn" onclick="clearPin()">Clear</button>
                <button class="num-btn" onclick="addPinDigit('0')">0</button>
                <button class="num-btn clear-btn" onclick="backspacePin()">⌫</button>
            </div>

            <div class="pin-buttons">
                <button class="pin-btn plus-btn" onclick="checkPin()">Unlock</button>
                <button class="pin-btn reset-btn" onclick="closePinModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Kid Selector Modal -->
    <div class="pin-modal" id="kidSelectorModal">
        <div class="pin-content">
            <div id="kidSelectorContent">
                <!-- Content will be dynamically generated -->
            </div>
            <div class="pin-buttons">
                <button class="pin-btn reset-btn" onclick="closeKidSelector()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- House Rules Modal -->
    <div class="pin-modal" id="houseRulesModal">
        <div class="house-rules-modal-content">
            <button class="modal-close-btn" onclick="closeHouseRules()" title="Close">✕</button>
            <div class="house-rules-scroll">
                <h2 style="text-align: center; margin-bottom: 20px;">📋 House Rules</h2>
                <div id="houseRulesContent" style="text-align: left;">
                    <!-- Content will be dynamically generated -->
                </div>
            </div>
        </div>
    </div>

    <!-- Parent Dashboard Slide-in Panel -->
    <div class="parent-dash-overlay" id="parentDashOverlay" onclick="closeParentDashboard()"></div>
    <div class="parent-dash-panel" id="parentDashPanel">
        <div class="parent-dash-header">
            <h2>👨‍👩‍👧 Parent Dashboard</h2>
            <button class="modal-close-btn" onclick="closeParentDashboard()" title="Close">✕</button>
        </div>
        <div class="parent-dash-section-title">Pending Approvals</div>
        <div id="parentDashContent">
            <!-- Dynamically rendered -->
        </div>
    </div>

    <!-- Unlock Indicator -->
    <div class="unlock-indicator" id="unlockIndicator" onclick="lockDashboard()">🔓 Unlocked (click to lock)</div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
